<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grades — StudyMate</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}
    .sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;padding:0 0.5rem;}
    .logo-icon{width:38px;height:38px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;}
    .logo-sub{font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
    .nav-section-label{font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0.75rem;margin:1.2rem 0 0.4rem;}
    .nav-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;transition:all 0.15s;margin-bottom:0.1rem;position:relative;}
    .nav-item svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;flex-shrink:0;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(99,102,241,0.12);color:var(--accent);font-weight:500;}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
    .sidebar-bottom{margin-top:auto;padding-top:1rem;}
    .user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.75rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;flex-shrink:0;color:#fff;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .user-role{font-size:0.68rem;color:var(--muted);}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;}
    .logout-btn:hover{color:var(--red);}
    .logout-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;}
    .main{margin-left:230px;flex:1;padding:2rem;overflow-y:auto;}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
    .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;}
    .page-sub{color:var(--muted);font-size:0.88rem;margin-top:0.2rem;}

    /* GPA summary */
    .gpa-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
    .gpa-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;}
    .gpa-val{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:0.25rem;}
    .gpa-label{font-size:0.78rem;color:var(--muted);}

    /* Subject grade cards */
    .grades-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
    .grade-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden;}
    .grade-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--accent));}
    .grade-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;}
    .grade-subject{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;}
    .grade-badge{font-size:0.72rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:6px;}
    .grade-inputs{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.75rem;}
    .grade-field label{font-size:0.7rem;color:var(--muted);display:block;margin-bottom:0.2rem;}
    .grade-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.4rem 0.6rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;}
    .grade-field input:focus{border-color:var(--accent);}
    .grade-avg{display:flex;justify-content:space-between;align-items:center;padding-top:0.75rem;border-top:1px solid var(--border);}
    .grade-avg-label{font-size:0.78rem;color:var(--muted);}
    .grade-avg-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;}
    .del-card-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;display:flex;}
    .del-card-btn:hover{color:var(--red);}
    .del-card-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;}

    /* Add subject */
    .add-subject-form{background:var(--surface);border:1px dashed var(--border);border-radius:14px;padding:1.25rem;display:flex;gap:0.75rem;align-items:flex-end;margin-bottom:1.5rem;}
    .add-subject-form input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;}
    .add-subject-form input:focus{border-color:var(--accent);}
    .btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.6rem 1rem;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;}

    .notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.25rem;font-size:0.88rem;z-index:999;animation:slideUp 0.3s ease;}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @media(max-width:600px){.sidebar{display:none;}.main{margin-left:0;}.gpa-row{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="8" height="18" rx="1.5" fill="rgba(255,255,255,0.3)"/><rect x="14" y="3" width="8" height="18" rx="1.5" fill="rgba(255,255,255,0.3)"/><rect x="9.5" y="3" width="5" height="18" rx="1" fill="rgba(255,255,255,0.6)"/><circle cx="20" cy="17" r="4" fill="white"/><polyline points="18,17 19.5,18.5 22,16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="logo-text">StudyMate</div><div class="logo-sub">Academic Companion</div></div>
  </div>
  <div class="nav-section-label">Main</div>
  <nav>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="tasks.html"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
    <a class="nav-item" href="reminders.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders</a>
    <div class="nav-section-label" style="margin-top:1rem;">Analytics</div>
    <a class="nav-item" href="tracker.html"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Tracker</a>
    <a class="nav-item" href="focus.html"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Focus Mode</a>
    <div class="nav-section-label" style="margin-top:1rem;">Account</div>
    <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a class="nav-item active" href="grades.html"><svg viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Grades</a>
    <a class="nav-item" href="schedule.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
    <a class="nav-item" href="notifications.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notifications</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info"><div class="user-name" id="user-name-display">Loading...</div><div class="user-role">Student</div></div>
      <button class="logout-btn" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Grades</div>
      <div class="page-sub">Track your grades per subject.</div>
    </div>
  </div>

  <!-- GPA Summary -->
  <div class="gpa-row">
    <div class="gpa-card">
      <div class="gpa-val" id="gpa-avg" style="color:var(--accent)">—</div>
      <div class="gpa-label">General Average</div>
    </div>
    <div class="gpa-card">
      <div class="gpa-val" id="gpa-highest" style="color:var(--green)">—</div>
      <div class="gpa-label">Highest Grade</div>
    </div>
    <div class="gpa-card">
      <div class="gpa-val" id="gpa-lowest" style="color:var(--yellow)">—</div>
      <div class="gpa-label">Lowest Grade</div>
    </div>
  </div>

  <!-- Add Subject -->
  <div class="add-subject-form">
    <input type="text" id="new-subject" placeholder="Subject name e.g. Mathematics"/>
    <button class="btn-add" onclick="addSubject()">+ Add Subject</button>
  </div>

  <!-- Grade Cards -->
  <div class="grades-grid" id="grades-grid">
    <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:0.88rem;">No subjects yet. Add one above!</div>
  </div>
</main>

<script type="module">
  import { requireAuth } from './js/auth.js';
  import './js/auth.js';

  const LS_KEY = 'studymate_grades';
  const COLORS = ['#6366f1','#22d3ee','#f59e0b','#22c55e','#a855f7','#ef4444','#f97316','#ec4899'];
  let grades = {};
  let currentUserId = '';

  requireAuth((user) => {
    currentUserId = user.uid;
    const saved = localStorage.getItem(LS_KEY + '_' + user.uid);
    grades = saved ? JSON.parse(saved) : {};
    render();
  });

  window.addSubject = () => {
    const name = document.getElementById('new-subject').value.trim();
    if (!name) return;
    if (grades[name]) { showNotif('Subject already exists!'); return; }
    grades[name] = { prelim:'', midterm:'', prefinal:'', final:'' };
    save();
    document.getElementById('new-subject').value = '';
    render();
  };

  window.deleteSubject = (name) => {
    if (!confirm(`Delete ${name}?`)) return;
    delete grades[name];
    save();
    render();
  };

  window.updateGrade = (subject, period, val) => {
    if (!grades[subject]) return;
    grades[subject][period] = val;
    save();
    updateSummary();
    const avgEl = document.getElementById(`avg-${btoa(subject)}`);
    if (avgEl) avgEl.textContent = calcAvg(grades[subject]);
    const badgeEl = document.getElementById(`badge-${btoa(subject)}`);
    if (badgeEl) {
      const avg = parseFloat(calcAvg(grades[subject]));
      badgeEl.textContent = getRemarks(avg);
      badgeEl.style.background = getColor(avg).bg;
      badgeEl.style.color = getColor(avg).text;
      avgEl.style.color = getColor(avg).text;
    }
  };

  function calcAvg(g) {
    const vals = [g.prelim, g.midterm, g.prefinal, g.final].map(v => parseFloat(v)).filter(v => !isNaN(v));
    if (!vals.length) return '—';
    return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
  }

  function getRemarks(avg) {
    if (isNaN(avg)) return '—';
    if (avg >= 90) return 'Excellent';
    if (avg >= 80) return 'Very Good';
    if (avg >= 75) return 'Good';
    if (avg >= 70) return 'Passing';
    return 'Needs Work';
  }

  function getColor(avg) {
    if (isNaN(avg)) return { bg:'rgba(107,114,128,0.15)', text:'#6b7280' };
    if (avg >= 90) return { bg:'rgba(34,197,94,0.15)', text:'#22c55e' };
    if (avg >= 75) return { bg:'rgba(99,102,241,0.15)', text:'#6366f1' };
    if (avg >= 70) return { bg:'rgba(245,158,11,0.15)', text:'#f59e0b' };
    return { bg:'rgba(239,68,68,0.15)', text:'#ef4444' };
  }

  function updateSummary() {
    const avgs = Object.values(grades).map(g => parseFloat(calcAvg(g))).filter(v => !isNaN(v));
    if (!avgs.length) {
      document.getElementById('gpa-avg').textContent = '—';
      document.getElementById('gpa-highest').textContent = '—';
      document.getElementById('gpa-lowest').textContent = '—';
      return;
    }
    document.getElementById('gpa-avg').textContent = (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(2);
    document.getElementById('gpa-highest').textContent = Math.max(...avgs).toFixed(2);
    document.getElementById('gpa-lowest').textContent = Math.min(...avgs).toFixed(2);
  }

  function render() {
    const grid = document.getElementById('grades-grid');
    const subjects = Object.keys(grades);
    if (!subjects.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:0.88rem;">No subjects yet. Add one above!</div>';
      updateSummary(); return;
    }
    grid.innerHTML = subjects.map((subj, i) => {
      const g = grades[subj];
      const avg = calcAvg(g);
      const avgNum = parseFloat(avg);
      const c = getColor(avgNum);
      const key = btoa(subj);
      return `<div class="grade-card" style="--card-color:${COLORS[i%COLORS.length]}">
        <div class="grade-card-header">
          <div class="grade-subject">${subj}</div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span class="grade-badge" id="badge-${key}" style="background:${c.bg};color:${c.text}">${getRemarks(avgNum)}</span>
            <button class="del-card-btn" onclick="deleteSubject('${subj}')"><svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
          </div>
        </div>
        <div class="grade-inputs">
          ${['prelim','midterm','prefinal','final'].map(p => `
            <div class="grade-field">
              <label>${p.charAt(0).toUpperCase()+p.slice(1)}</label>
              <input type="number" min="0" max="100" placeholder="0-100"
                value="${g[p]||''}"
                oninput="updateGrade('${subj}','${p}',this.value)"/>
            </div>`).join('')}
        </div>
        <div class="grade-avg">
          <span class="grade-avg-label">Average</span>
          <span class="grade-avg-val" id="avg-${key}" style="color:${c.text}">${avg}</span>
        </div>
      </div>`;
    }).join('');
    updateSummary();
  }

  function save() {
    localStorage.setItem(LS_KEY + '_' + currentUserId, JSON.stringify(grades));
  }

  function showNotif(msg) {
    const n = document.createElement('div'); n.className='notif'; n.textContent=msg;
    document.body.appendChild(n); setTimeout(()=>n.remove(),3000);
  }
</script>
</body>
</html>
