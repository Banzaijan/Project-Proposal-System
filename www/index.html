<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyTracker — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- Custom Splash Screen -->
<div id="app-splash" style="position:fixed;inset:0;background:#000000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease;">
  <svg viewBox="0 0 24 24" fill="none" width="90" height="90">
    <circle cx="12" cy="12" r="9" stroke="#f97316" stroke-width="2"/>
    <circle cx="12" cy="12" r="5" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <circle cx="12" cy="12" r="2" fill="#f97316"/>
  </svg>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;background:linear-gradient(135deg,#f97316,#fdba74);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:1.2rem;">MyTracker</div>
  <div style="font-size:0.75rem;color:#666;letter-spacing:3px;text-transform:uppercase;margin-top:0.5rem;">Track Smart. Study Hard.</div>
</div>

<script>
  window.addEventListener('load', function() {
    setTimeout(function() {
      var splash = document.getElementById('app-splash');
      splash.style.opacity = '0';
      setTimeout(function() { splash.style.display = 'none'; }, 500);
    }, 2000);
  });
</script>

<div class="auth-screen">
  <div class="auth-box">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:2rem;">
      <div style="width:52px;height:52px;background:#000;border:2px solid #f97316;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg viewBox="0 0 24 24" fill="none" width="30" height="30">
          <circle cx="12" cy="12" r="9" stroke="#f97316" stroke-width="2"/>
          <circle cx="12" cy="12" r="5" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
          <circle cx="12" cy="12" r="2" fill="#f97316"/>
        </svg>
      </div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,#f97316,#fdba74);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;">MyTracker</div>
        <div style="font-size:0.65rem;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Track Smart. Study Hard.</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@school.edu"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Login →</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Juan Dela Cruz"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@school.edu"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="min. 6 characters" onkeydown="if(event.key==='Enter') doRegister()"/>
      </div>
      <button class="btn-primary" onclick="doRegister()">Create Account →</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<script type="module">
  import { redirectIfLoggedIn } from './js/auth.js';
  import './js/auth.js';
  redirectIfLoggedIn();
</script>
</body>
</html>
