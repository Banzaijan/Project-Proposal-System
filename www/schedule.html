<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Schedule — MyTracker</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#000000;--surface:#0a0a0a;--surface2:#141414;--border:#222222;--accent:#f97316;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#ffffff;--muted:#888888;}
    *{margin:0;padding:0;box-sizing:border-box;} body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}
    .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;padding:0 0.5rem;}
    .logo-icon{width:38px;height:38px;background:#000;border:1.5px solid #f97316;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .nav-section-label{font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0.75rem;margin:1.2rem 0 0.4rem;}
    .nav-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;transition:all 0.15s;margin-bottom:0.1rem;position:relative;}
    .nav-item svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;flex-shrink:0;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(249,115,22,0.12);color:var(--accent);font-weight:500;}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
    .sidebar-bottom{margin-top:auto;padding-top:1rem;}
    .user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.75rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;flex-shrink:0;color:#fff;}
    .user-info{flex:1;min-width:0;} .user-name{font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .user-role{font-size:0.68rem;color:var(--muted);}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;} .logout-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;}
    .main{margin-left:240px;flex:1;padding:2rem;overflow-y:auto;}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
    .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;}
    .page-sub{color:var(--muted);font-size:0.88rem;margin-top:0.2rem;}
    .field{margin-bottom:1rem;} .field label{display:block;font-size:0.77rem;color:var(--muted);margin-bottom:0.35rem;}
    .field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field select:focus{border-color:var(--accent);}
    .notif{position:fixed;bottom:80px;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.25rem;font-size:0.88rem;z-index:999;animation:slideUp 0.3s ease;}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.5rem 1rem;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
    .day-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .day-tab{padding:0.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .day-tab:hover{color:var(--text);} .day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;} .day-tab.today{border-color:var(--accent);color:var(--accent);}
    .schedule-list{display:flex;flex-direction:column;gap:0.75rem;max-width:600px;}
    .sched-card{display:flex;align-items:center;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;position:relative;overflow:hidden;transition:border-color 0.2s;}
    .sched-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--card-color,var(--accent));}
    .sched-time{min-width:90px;font-size:0.8rem;color:var(--muted);flex-shrink:0;}
    .sched-info{flex:1;} .sched-subject{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;} .sched-room{font-size:0.75rem;color:var(--muted);margin-top:0.1rem;}
    .sched-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;} .sched-del:hover{color:var(--red);} .sched-del svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;}
    .empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.88rem;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem;width:400px;max-width:90vw;}
    .modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:1.5rem;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
    .modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;}
    .btn-cancel{background:var(--surface2);color:var(--muted);border:none;border-radius:8px;padding:0.6rem 1.2rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.6rem 1.2rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
  </style>
</head>

      <div style="font-size:0.6rem;color:#666;letter-spacing:0.5px;text-transform:uppercase;margin-top:1px;">Track Smart. Study Hard.</div>

  <nav><div class="nav-section-label" style="margin-top:1rem;">Main</div>

<a class="nav-item" href="tasks.html"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
<a class="nav-item" href="reminders.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders</a>
<div class="nav-section-label" style="margin-top:1rem;">Analytics</div>
<a class="nav-item" href="tracker.html"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Tracker</a>
<a class="nav-item" href="focus.html"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Focus Mode</a>
<div class="nav-section-label" style="margin-top:1rem;">Account</div>
<a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
<a class="nav-item" href="grades.html"><svg viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Grades</a>
<a class="nav-item active" href="schedule.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>

</nav>
  <div class="sidebar-bottom"><div class="user-chip"><div class="avatar" id="user-avatar">?</div><div class="user-info"><div class="user-name" id="user-name-display">Loading...</div><div class="user-role">Student</div></div><button class="logout-btn" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div></div>

<main class="main">
  <div class="page-header"><div class="page-title">Schedule</div><button class="btn-add" onclick="document.getElementById('sched-modal').style.display='flex'">+ Add Class</button></div>
  <div class="day-tabs" id="day-tabs">
    <button class="day-tab" onclick="setDay(0,this)">Monday</button>
    <button class="day-tab" onclick="setDay(1,this)">Tuesday</button>
    <button class="day-tab" onclick="setDay(2,this)">Wednesday</button>
    <button class="day-tab" onclick="setDay(3,this)">Thursday</button>
    <button class="day-tab" onclick="setDay(4,this)">Friday</button>
    <button class="day-tab" onclick="setDay(5,this)">Saturday</button>
  </div>
  <div class="schedule-list" id="schedule-list"><div class="empty">No classes on this day. Add one!</div></div>
</main>
<div class="modal-overlay" id="sched-modal" onclick="if(event.target.id==='sched-modal') this.style.display='none'">
  <div class="modal">
    <div class="modal-title">Add Class</div>
    <div class="field"><label>Subject</label><input type="text" id="s-subject" placeholder="e.g. Mathematics"/></div>
    <div class="field"><label>Room / Location</label><input type="text" id="s-room" placeholder="e.g. Room 301"/></div>
    <div class="field"><label>Day</label><select id="s-day"><option value="0">Monday</option><option value="1">Tuesday</option><option value="2">Wednesday</option><option value="3">Thursday</option><option value="4">Friday</option><option value="5">Saturday</option></select></div>
    <div class="field-row"><div class="field"><label>Start Time</label><input type="time" id="s-start"/></div><div class="field"><label>End Time</label><input type="time" id="s-end"/></div></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('sched-modal').style.display='none'">Cancel</button><button class="btn-save" onclick="saveClass()">Save</button></div>
  </div>
</div>
<script type="module">
  import { requireAuth } from './js/auth.js';
  import './js/auth.js';
  const LS_KEY='studymate_schedule', COLORS=['#f97316','#22d3ee','#f59e0b','#22c55e','#a855f7','#ef4444'];
  let schedule=[], currentDay=new Date().getDay()===0?0:new Date().getDay()-1, userId='';
  if(currentDay>5) currentDay=0;
  requireAuth((user)=>{ userId=user.uid; const saved=localStorage.getItem(LS_KEY+'_'+user.uid); schedule=saved?JSON.parse(saved):[]; initTabs(); renderDay(); });
  function initTabs(){ const tabs=document.querySelectorAll('.day-tab'); tabs.forEach((t,i)=>{ if(i===currentDay) t.classList.add('active'); const todayIdx=new Date().getDay()===0?-1:new Date().getDay()-1; if(i===todayIdx) t.classList.add('today'); }); }
  window.setDay=(day,btn)=>{ currentDay=day; document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); renderDay(); };
  window.saveClass=()=>{ const subj=document.getElementById('s-subject').value.trim(); if(!subj) return; schedule.push({id:Date.now().toString(),subject:subj,room:document.getElementById('s-room').value.trim(),day:parseInt(document.getElementById('s-day').value),start:document.getElementById('s-start').value,end:document.getElementById('s-end').value}); localStorage.setItem(LS_KEY+'_'+userId,JSON.stringify(schedule)); document.getElementById('sched-modal').style.display='none'; ['s-subject','s-room','s-start','s-end'].forEach(id=>document.getElementById(id).value=''); renderDay(); };
  window.deleteClass=(id)=>{ schedule=schedule.filter(s=>s.id!==id); localStorage.setItem(LS_KEY+'_'+userId,JSON.stringify(schedule)); renderDay(); };
  function fmt(t){ if(!t) return '—'; const [h,m]=t.split(':'); const hr=parseInt(h); return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`; }
  function renderDay(){ const el=document.getElementById('schedule-list'); const items=schedule.filter(s=>s.day===currentDay).sort((a,b)=>a.start.localeCompare(b.start)); if(!items.length){ el.innerHTML='<div class="empty">No classes on this day. Add one!</div>'; return; } el.innerHTML=items.map((s,i)=>`<div class="sched-card" style="--card-color:${COLORS[i%COLORS.length]}"><div class="sched-time">${fmt(s.start)}<br><span style="color:var(--muted)">${fmt(s.end)}</span></div><div class="sched-info"><div class="sched-subject">${s.subject}</div><div class="sched-room">${s.room||'No room set'}</div></div><button class="sched-del" onclick="deleteClass('${s.id}')"><svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button></div>`).join(''); }
</script>
