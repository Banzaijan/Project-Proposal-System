<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reminders — StudyMate</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;--blue:#3b82f6;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}
    .sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sidebar-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;padding:0 0.5rem;}
    .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .logo-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;}
    .logo-sub{font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
    .nav-section-label{font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0.75rem;margin:1.2rem 0 0.4rem;}
    .nav-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;transition:all 0.15s;margin-bottom:0.1rem;position:relative;}
    .nav-item svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;flex-shrink:0;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(99,102,241,0.12);color:var(--accent);font-weight:500;}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
    .sidebar-bottom{margin-top:auto;}
    .user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.75rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;flex-shrink:0;color:#fff;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .user-role{font-size:0.68rem;color:var(--muted);}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;}
    .logout-btn:hover{color:var(--red);}
    .logout-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;}
    .main{margin-left:230px;flex:1;padding:2rem;overflow-y:auto;max-width:820px;}
    .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:0.2rem;}
    .page-sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem;}
    .filter-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .tab{padding:0.35rem 0.9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .tab:hover{color:var(--text);}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

    /* Notification cards */
    .notif-list{display:flex;flex-direction:column;gap:0.75rem;}
    .notif-card{display:flex;align-items:flex-start;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;position:relative;overflow:hidden;transition:transform 0.2s,border-color 0.2s;}
    .notif-card:hover{transform:translateX(3px);border-color:rgba(255,255,255,0.12);}
    .notif-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--notif-color,var(--accent));}
    .notif-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--notif-bg,rgba(99,102,241,0.1));}
    .notif-icon-wrap svg{width:18px;height:18px;stroke:var(--notif-color,var(--accent));stroke-width:2;}
    .notif-body{flex:1;min-width:0;}
    .notif-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.2rem;}
    .notif-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;}
    .notif-time{font-size:0.71rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
    .notif-subject{font-size:0.77rem;color:var(--muted);margin-bottom:0.3rem;}
    .notif-msg{font-size:0.82rem;line-height:1.5;color:rgba(232,234,240,0.75);}
    .urgency-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.69rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:20px;margin-top:0.4rem;}
    .urgency-badge svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;}
    .urgency-overdue{background:rgba(239,68,68,0.15);color:var(--red);}
    .urgency-today{background:rgba(245,158,11,0.2);color:var(--yellow);}
    .urgency-soon{background:rgba(99,102,241,0.15);color:var(--accent);}
    .urgency-upcoming{background:rgba(34,197,94,0.1);color:var(--green);}
    .empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.88rem;}
    .empty svg{width:36px;height:36px;stroke:var(--muted);stroke-width:1.5;margin-bottom:0.75rem;display:block;margin-left:auto;margin-right:auto;}
    @media(max-width:600px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <div><div class="logo-text">StudyMate</div><div class="logo-sub">Academic Companion</div></div>
  </div>
  <div class="nav-section-label">Main</div>
  <nav>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="tasks.html"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
    <a class="nav-item active" href="reminders.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders</a>
    <div class="nav-section-label" style="margin-top:1rem;">Analytics</div>
    <a class="nav-item" href="tracker.html"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Tracker</a>
    <a class="nav-item" href="focus.html"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Focus Mode</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info"><div class="user-name" id="user-name-display">Loading...</div><div class="user-role">Student</div></div>
      <button class="logout-btn" onclick="doLogout()" title="Sign Out"><svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-title">Reminders</div>
  <div class="page-sub">Stay ahead of your deadlines.</div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('overdue',this)">Overdue</button>
    <button class="tab" onclick="setFilter('today',this)">Today</button>
    <button class="tab" onclick="setFilter('soon',this)">This Week</button>
    <button class="tab" onclick="setFilter('upcoming',this)">Upcoming</button>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      No reminders yet. Add tasks to see them here!
    </div>
  </div>
</main>

<script type="module">
  import { requireAuth } from './js/auth.js';
  import './js/auth.js';
  import { listenTasks } from './js/tasks.js';

  window.addEventListener('load', () => lucide.createIcons());

  let allTasks = [];
  let currentFilter = 'all';

  window.setFilter = (filter, btn) => {
    currentFilter = filter;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderNotifs(allTasks);
  };

  requireAuth((user) => {
    listenTasks(user.uid, (tasks) => {
      allTasks = tasks.filter(t => !t.done);
      renderNotifs(allTasks);
    });
  });

  function getUrgency(due) {
    if (!due) return { label:'no-date', text:'No due date', diff:9999 };
    const now = new Date(); now.setHours(0,0,0,0);
    const d = new Date(due); d.setHours(0,0,0,0);
    const diff = Math.round((d-now)/86400000);
    if (diff < 0)  return { label:'overdue',  text:`Overdue by ${Math.abs(diff)} day${Math.abs(diff)>1?'s':''}`, diff };
    if (diff === 0) return { label:'today',    text:'Due TODAY', diff };
    if (diff <= 7)  return { label:'soon',     text:`Due in ${diff} day${diff>1?'s':''}`, diff };
    return              { label:'upcoming',  text:`Due in ${diff} days`, diff };
  }

  function renderNotifs(tasks) {
    const el = document.getElementById('notif-list');
    let filtered = currentFilter === 'all' ? tasks
      : tasks.filter(t => getUrgency(t.due).label === currentFilter);
    filtered = [...filtered].sort((a,b) => {
      const da = a.due ? new Date(a.due) : new Date('9999');
      const db = b.due ? new Date(b.due) : new Date('9999');
      return da - db;
    });

    if (!filtered.length) {
      el.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        No reminders in this category!
      </div>`;
      return;
    }

    const uc = {
      overdue:  { color:'#ef4444', bg:'rgba(239,68,68,0.1)',    cls:'urgency-overdue', icon:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' },
      today:    { color:'#f59e0b', bg:'rgba(245,158,11,0.1)',   cls:'urgency-today',   icon:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
      soon:     { color:'#6366f1', bg:'rgba(99,102,241,0.1)',   cls:'urgency-soon',    icon:'<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      upcoming: { color:'#22c55e', bg:'rgba(34,197,94,0.08)',   cls:'urgency-upcoming',icon:'<svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' },
      'no-date':{ color:'#6b7280', bg:'rgba(107,114,128,0.1)',  cls:'urgency-upcoming',icon:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' },
    };

    const typeIcons = {
      exam:       '<svg viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
      activity:   '<svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
      project:    '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>',
      assignment: '<svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
    };

    el.innerHTML = filtered.map(t => {
      const urg = getUrgency(t.due);
      const u = uc[urg.label] || uc['no-date'];
      const typeIcon = typeIcons[t.type||'assignment'] || typeIcons.assignment;
      const timeLabel = t.due
        ? new Date(t.due).toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'})
        : 'No deadline';
      const typeLabel = t.type ? t.type.charAt(0).toUpperCase()+t.type.slice(1) : 'Assignment';

      return `<div class="notif-card" style="--notif-color:${u.color};--notif-bg:${u.bg}">
        <div class="notif-icon-wrap">${typeIcon}</div>
        <div class="notif-body">
          <div class="notif-header">
            <div class="notif-title">${t.title}</div>
            <div class="notif-time">${timeLabel}</div>
          </div>
          <div class="notif-subject">${t.subject||'General'} · ${typeLabel}</div>
          ${t.notes?`<div class="notif-msg">${t.notes}</div>`:''}
          <div class="urgency-badge ${u.cls}">${u.icon} ${urg.text}</div>
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
