<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — StudyMate</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}
    .sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:2rem;padding:0 0.5rem;}
    .logo-icon{width:38px;height:38px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;}
    .logo-sub{font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
    .nav-section-label{font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0.75rem;margin:1.2rem 0 0.4rem;}
    .nav-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;transition:all 0.15s;margin-bottom:0.1rem;position:relative;}
    .nav-item svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;flex-shrink:0;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(99,102,241,0.12);color:var(--accent);font-weight:500;}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
    .sidebar-bottom{margin-top:auto;padding-top:1rem;}
    .user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.75rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;flex-shrink:0;color:#fff;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .user-role{font-size:0.68rem;color:var(--muted);}
    .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;}
    .logout-btn:hover{color:var(--red);}
    .logout-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;}
    .main{margin-left:230px;flex:1;padding:2rem;overflow-y:auto;max-width:680px;}
    .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:0.2rem;}
    .page-sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem;}
    .profile-hero{display:flex;align-items:center;gap:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;flex-shrink:0;}
    .profile-hero-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;}
    .profile-hero-email{font-size:0.82rem;color:var(--muted);margin-top:0.2rem;}
    .profile-badge{display:inline-flex;align-items:center;background:rgba(99,102,241,0.12);color:var(--accent);border-radius:20px;padding:0.2rem 0.7rem;font-size:0.73rem;font-weight:600;margin-top:0.5rem;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
    .card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;margin-bottom:1.25rem;color:var(--text);}
    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:0.77rem;color:var(--muted);margin-bottom:0.35rem;}
    .field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field select:focus{border-color:var(--accent);}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.6rem 1.5rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.88rem;}
    .btn-save:hover{opacity:0.9;}
    .notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.25rem;font-size:0.88rem;z-index:9999;animation:slideUp 0.3s ease;max-width:300px;}
    .notif.success{border-color:var(--green);color:var(--green);}
    .notif.error{border-color:var(--red);color:var(--red);}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @media(max-width:600px){.sidebar{display:none;}.main{margin-left:0;}.field-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="8" height="18" rx="1.5" fill="rgba(255,255,255,0.3)"/><rect x="14" y="3" width="8" height="18" rx="1.5" fill="rgba(255,255,255,0.3)"/><rect x="9.5" y="3" width="5" height="18" rx="1" fill="rgba(255,255,255,0.6)"/><circle cx="20" cy="17" r="4" fill="white"/><polyline points="18,17 19.5,18.5 22,16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="logo-text">StudyMate</div><div class="logo-sub">Academic Companion</div></div>
  </div>
  <div class="nav-section-label">Main</div>
  <nav>
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="tasks.html"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
    <a class="nav-item" href="reminders.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Reminders</a>
    <div class="nav-section-label" style="margin-top:1rem;">Analytics</div>
    <a class="nav-item" href="tracker.html"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Tracker</a>
    <a class="nav-item" href="focus.html"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Focus Mode</a>
    <div class="nav-section-label" style="margin-top:1rem;">Account</div>
    <a class="nav-item active" href="profile.html"><svg viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    <a class="nav-item" href="grades.html"><svg viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Grades</a>
    <a class="nav-item" href="schedule.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
    <a class="nav-item" href="notifications.html"><svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notifications</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info"><div class="user-name" id="user-name-display">Loading...</div><div class="user-role">Student</div></div>
      <button class="logout-btn" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-title">Profile</div>
  <div class="page-sub">Manage your account and personal information.</div>

  <div class="profile-hero">
    <div class="profile-avatar" id="big-avatar">?</div>
    <div>
      <div class="profile-hero-name" id="hero-name">Loading...</div>
      <div class="profile-hero-email" id="hero-email"></div>
      <div class="profile-badge">Student</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Personal Information</div>
    <div class="field"><label>Full Name</label><input type="text" id="p-name" placeholder="Your full name"/></div>
    <div class="field-row">
      <div class="field"><label>School / University</label><input type="text" id="p-school" placeholder="e.g. DLSU"/></div>
      <div class="field"><label>Year Level</label>
        <select id="p-year">
          <option value="">Select year</option>
          <option value="1st Year">1st Year</option>
          <option value="2nd Year">2nd Year</option>
          <option value="3rd Year">3rd Year</option>
          <option value="4th Year">4th Year</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Course / Strand</label><input type="text" id="p-course" placeholder="e.g. BSIT"/></div>
      <div class="field"><label>Section</label><input type="text" id="p-section" placeholder="e.g. A"/></div>
    </div>
    <button class="btn-save" onclick="saveProfile()">Save Changes</button>
  </div>

  <div class="card">
    <div class="card-title">Change Password</div>
    <div class="field"><label>Current Password</label><input type="password" id="p-current-pass" placeholder="Enter your current password"/></div>
    <div class="field"><label>New Password</label><input type="password" id="p-pass" placeholder="At least 6 characters"/></div>
    <div class="field"><label>Confirm New Password</label><input type="password" id="p-pass2" placeholder="Repeat new password"/></div>
    <button class="btn-save" onclick="changePassword()">Update Password</button>
  </div>
</main>

<script type="module">
  import { requireAuth } from './js/auth.js';
  import './js/auth.js';
  import { auth } from './js/firebase.js';
  import { updateProfile, updatePassword, EmailAuthProvider, reauthenticateWithCredential }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const LS_PROFILE = 'studymate_profile';

  requireAuth((user) => {
    const saved = JSON.parse(localStorage.getItem(LS_PROFILE) || '{}');
    const name = user.displayName || user.email.split('@')[0];

    document.getElementById('big-avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('hero-name').textContent = name;
    document.getElementById('hero-email').textContent = user.email;
    document.getElementById('p-name').value = name;
    document.getElementById('p-school').value = saved.school || '';
    document.getElementById('p-year').value = saved.year || '';
    document.getElementById('p-course').value = saved.course || '';
    document.getElementById('p-section').value = saved.section || '';

    window.saveProfile = async () => {
      const newName = document.getElementById('p-name').value.trim();
      if (!newName) { showNotif('Name cannot be empty.', 'error'); return; }
      try {
        await updateProfile(auth.currentUser, { displayName: newName });
        const data = {
          school:  document.getElementById('p-school').value,
          year:    document.getElementById('p-year').value,
          course:  document.getElementById('p-course').value,
          section: document.getElementById('p-section').value,
        };
        localStorage.setItem(LS_PROFILE, JSON.stringify(data));
        document.getElementById('hero-name').textContent = newName;
        document.getElementById('user-name-display').textContent = newName;
        document.getElementById('big-avatar').textContent = newName.charAt(0).toUpperCase();
        showNotif('Profile saved!', 'success');
      } catch(e) { showNotif('Error: ' + e.message, 'error'); }
    };

    window.changePassword = async () => {
      const currentPass = document.getElementById('p-current-pass').value;
      const p1 = document.getElementById('p-pass').value;
      const p2 = document.getElementById('p-pass2').value;

      if (!currentPass) { showNotif('Please enter your current password.', 'error'); return; }
      if (p1.length < 6) { showNotif('New password must be at least 6 characters.', 'error'); return; }
      if (p1 !== p2) { showNotif('New passwords do not match.', 'error'); return; }

      try {
        const credential = EmailAuthProvider.credential(auth.currentUser.email, currentPass);
        await reauthenticateWithCredential(auth.currentUser, credential);
        await updatePassword(auth.currentUser, p1);
        document.getElementById('p-current-pass').value = '';
        document.getElementById('p-pass').value = '';
        document.getElementById('p-pass2').value = '';
        showNotif('Password updated successfully!', 'success');
      } catch(e) {
        if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
          showNotif('Current password is incorrect.', 'error');
        } else {
          showNotif('Error: ' + e.message, 'error');
        }
      }
    };
  });

  function showNotif(msg, type = 'info') {
    document.querySelectorAll('.notif').forEach(n => n.remove());
    const n = document.createElement('div');
    n.className = `notif ${type}`;
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3500);
  }
</script>
</body>
</html>
